name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests (no Docker)
        run: npm test -- --reporter=verbose
        env:
          ETHERSCAN_API_KEY: dummy
          ETH_RPC_URL: https://eth-mainnet.g.alchemy.com/v2/dummy
